<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Support | Tether Tags</title>
    <style>
        :root { --bg-color: #050505; --surface: #111111; --text-main: #ffffff; --accent: #FF6961; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 40px 20px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; min-height: 100vh; }
        .container { max-width: 400px; width: 100%; }
        .box { padding: 40px; background: var(--surface); border-radius: 24px; border: 1px solid #222; }
        h1 { color: var(--accent); margin-bottom: 20px; font-size: 1.5rem; text-align: center; }
        input, textarea { width: 100%; background: #161616; border: 1px solid #333; color: white; padding: 16px; border-radius: 12px; margin-bottom: 15px; }
        button { width: 100%; background: white; color: black; padding: 16px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; }
        button:hover { background: #e0e0e0; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: var(--accent); text-decoration: none; font-size: 0.9rem; }
      .logo {
  width: 100px;
  height: 100px;
  border-radius: 20px;
  border: 1px solid #333;
  /* Centering updates below */
  display: block;
  margin: 0 auto 1.5rem auto; /* Top, Right (auto), Bottom, Left (auto) */
}
    </style>
</head>
<body>
    <div class="container">
        <div class="box" id="formArea">
          <img src="https://i.ibb.co/5XnsDTjD/TT.png" class="logo" alt="Tether">
            <h1>Contact Support</h1>
            <form id="contactForm">
                <input type="text" name="name" placeholder="Full Name" required>
                <input type="tel" name="phone" placeholder="WhatsApp Number" required>
                <textarea name="message" rows="4" placeholder="How can we help?" required></textarea>
                <button type="submit" id="submitBtn">Send Message</button>
            </form>
            <a href="home.html" class="back-link">&larr; Back to Home</a>
        </div>
    </div>

    <script>
        document.getElementById('contactForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const data = Object.fromEntries(new FormData(e.target));
            
            btn.innerText = "Sending..."; btn.disabled = true;

            const payload = {
                tag: "NEW_BUYER", // This matches the script update above
                message: data.message,
                name: data.name,
                phone: data.phone
            };

            await fetch("https://script.google.com/macros/s/AKfycbz3oQqBzevolDjsRwTJexsog18KMq7cbavGMlRtJsDS9B4wV_-ks86o40xX2DFPVPhh/exec", { 
                method: "POST", mode: "no-cors", headers: { "Content-Type": "text/plain" }, body: JSON.stringify(payload) 
            });

            document.getElementById('formArea').innerHTML = `
                <img src="https://i.ibb.co/5XnsDTjD/TT.png" class="logo" alt="Tether">
                <h1 style="color:#10b981">Message Sent!</h1>
                <p>We've received your request and will get back to you shortly.</p>
                <a href="home.html" class="back-link">&larr; Back to Home</a>
            `;
        };
    </script>
</body>
</html>
