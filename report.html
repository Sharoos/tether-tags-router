<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Report Issue</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; text-align: center; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #28a745; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div style="width:100%; max-width:400px;">
        <h2>What is the issue?</h2>
        <a href="#" class="btn" onclick="sendAlert('Blocking Way')">Blocking My Way</a>
        <a href="#" class="btn" onclick="sendAlert('Found Item')">I Found Your Item</a>
        <a href="#" class="btn" onclick="sendAlert('Urgent Call')">Please Call Me</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const tag = params.get('tag');

        async function sendAlert(issue) {
            await fetch("YOUR_GOOGLE_SCRIPT_URL", {
                method: "POST",
                body: JSON.stringify({ tag: tag, issue: issue })
            });
            alert("Notification sent to owner!");
        }
    </script>
</body>
</html>
