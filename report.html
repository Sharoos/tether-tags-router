<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Owner | Tether</title>
    <style>
        :root {
            --bg-color: #050505;
            --surface: #111111;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent: #FF6961;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body { 
            background-color: var(--bg-color); 
            background-image: radial-gradient(circle at 50% -20%, #1a1a1a 0%, #050505 100%);
            color: var(--text-main); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 20px;
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .container { 
            text-align: center; max-width: 400px; width: 100%; 
            background: var(--surface); padding: 40px; border-radius: 24px; 
            border: 1px solid #222; animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .logo { width: 100px; height: 100px; border-radius: 20px; margin-bottom: 1.5rem; border: 1px solid #333; }
        
        h2 { font-size: 1.4rem; margin-bottom: 1rem; }
        p { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 2rem; }

        textarea {
            width: 100%; background: #161616; border: 1px solid #333;
            color: white; padding: 16px; border-radius: 12px;
            font-size: 0.95rem; margin-bottom: 20px; resize: none; transition: 0.3s;
        }
        textarea:focus { outline: none; border-color: var(--accent); background: #1a1a1a; }

        .btn {
            display: block; width: 100%; background: #1a1a1a; color: white; 
            padding: 16px; border-radius: 12px; border: 1px solid #333;
            font-weight: 600; cursor: pointer; transition: 0.3s; margin-bottom: 12px;
        }
        .btn:hover { background: #222; transform: translateY(-2px); border-color: #444; }
        .btn-accent { background: white; color: black; border: none; font-weight: 700; margin-top: 10px; }
        .btn-accent:hover { background: #e0e0e0; transform: translateY(0); }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <div id="actionArea">
            <img src="https://i.ibb.co/5XnsDTjD/TT.png" class="logo" alt="Tether">
            <h2>Contact Owner</h2>
            <textarea id="customMsg" rows="3" placeholder="Add a note (Optional, e.g., 'Found near Gate 2')"></textarea>
            
            <button class="btn" onclick="sendAlert('Blocking Way', this)">Vehicle is blocking my way</button>
            <button class="btn" onclick="sendAlert('Found Item', this)">I found your lost item</button>
        </div>
    </div>

    <script>
        // 1. Tag handling (Sticky Tag Logic)
        let tag = new URLSearchParams(window.location.search).get('tag');
        if (tag) { localStorage.setItem('currentTag', tag); } else { tag = localStorage.getItem('currentTag'); }
        
        // 2. MASK THE URL
        window.history.replaceState({}, document.title, window.location.protocol + "//" + window.location.host + window.location.pathname);

        // 3. The alert function
        async function sendAlert(issue, btn) {
            const custom = document.getElementById('customMsg').value;
            btn.innerText = "Sending..."; btn.disabled = true;

            const payload = {
                tag: tag,
                issue: issue,
                details: custom || "None"
            };

            await fetch("https://script.google.com/macros/s/AKfycbz3oQqBzevolDjsRwTJexsog18KMq7cbavGMlRtJsDS9B4wV_-ks86o40xX2DFPVPhh/exec", { 
                method: "POST", 
                mode: "no-cors",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify(payload) 
            });

            // Universal Success State
            document.getElementById('actionArea').innerHTML = `
                <div style="animation: fadeInUp 0.5s ease-out;">
                    <h2 style="color: #10b981; margin-bottom: 15px;">Owner Notified!</h2>
                    <p style="margin-bottom: 25px; color: var(--text-muted);">The owner has received your message instantly. Thank you for your help!</p>
                    <a href="home.html" class="btn btn-accent">Get your own Tether Tag</a>
                </div>
            `;
        }
    </script>
</body>
</html>
