<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Issue | Tether</title>
    <style>
        :root {
            --bg-color: #0f1115;
            --surface: #1c1f26;
            --text-main: #f8f9fa;
            --text-muted: #9ca3af;
            --accent: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .container { width: 100%; max-width: 400px; animation: fadeIn 0.6s ease forwards; opacity: 0; }
        @keyframes fadeIn { to { opacity: 1; } }

        /* Branding Area */
        .brand { text-align: center; margin-bottom: 2rem; }
        .logo-placeholder { 
            width: 80px; height: 80px; background: var(--surface); 
            border: 2px solid var(--accent); border-radius: 50%;
            margin: 0 auto 1rem; display: flex; align-items: center; 
            justify-content: center; font-weight: bold; color: var(--accent);
            font-size: 1.5rem;
        }

        .header { text-align: center; margin-bottom: 2rem; }
        .header h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: 10px; }

        /* Custom Input */
        textarea {
            width: 100%; background: #15171c; border: 1px solid #2d313a;
            color: white; padding: 12px; border-radius: 10px;
            font-size: 0.95rem; margin-bottom: 20px; resize: none;
        }
        textarea:focus { outline: none; border-color: var(--accent); }

        .btn {
            display: flex; align-items: center; justify-content: center;
            width: 100%; background-color: var(--surface); color: var(--text-main);
            border: 1px solid #2d313a; padding: 18px; margin-bottom: 12px;
            border-radius: 12px; font-weight: 500; cursor: pointer; transition: 0.2s;
            position: relative; overflow: hidden;
        }
        .btn::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
        .btn-warning::before { background-color: #f59e0b; }
        .btn-success::before { background-color: #10b981; }
        
        .btn:hover { background-color: #242831; transform: scale(1.01); }
        .btn:active { transform: scale(0.98); }

        .toast {
            visibility: hidden; min-width: 250px; background-color: #10b981;
            color: white; text-align: center; border-radius: 8px; padding: 16px;
            position: fixed; z-index: 1; bottom: 30px; left: 50%;
            transform: translateX(-50%); opacity: 0; transition: 0.3s;
        }
        .toast.show { visibility: visible; opacity: 1; bottom: 50px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand">
            <div class="logo-placeholder">TT</div>
            <h2>Tether</h2>
        </div>

        <div class="header">
            <h2>Contact Owner</h2>
            <textarea id="customMsg" rows="3" placeholder="Add a note (Optional, e.g., 'Found near Gate 2')"></textarea>
        </div>

        <button class="btn btn-warning" onclick="sendAlert('Blocking Way', this, 'Vehicle is blocking my way')">Vehicle is blocking my way</button>
        <button class="btn btn-success" onclick="sendAlert('Found Item', this, 'I found your lost item')">I found your lost item</button>
    </div>

    <div id="toast" class="toast">Notification sent!</div>

    <script>
        // 1. Tag handling (Sticky Tag)
        let tag = new URLSearchParams(window.location.search).get('tag');
        if (tag) { localStorage.setItem('currentTag', tag); } else { tag = localStorage.getItem('currentTag'); }

        // 2. MASK THE URL
        window.history.replaceState({}, document.title, window.location.protocol + "//" + window.location.host + window.location.pathname);

        // 3. The alert function with custom message
        async function sendAlert(issue, btn, label) {
            const custom = document.getElementById('customMsg').value;
            const finalIssue = custom ? `${issue}: ${custom}` : issue;
            
            btn.innerText = "Sending..."; btn.disabled = true;

            await fetch("https://script.google.com/macros/s/AKfycbz3oQqBzevolDjsRwTJexsog18KMq7cbavGMlRtJsDS9B4wV_-ks86o40xX2DFPVPhh/exec", { 
                method: "POST", mode: "no-cors",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ tag: tag, issue: finalIssue }) 
            });

            btn.innerText = label; btn.disabled = false;
            const toast = document.getElementById("toast");
            toast.className = "toast show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }
    </script>
</body>
</html>
