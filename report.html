<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; text-align: center; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #28a745; color: white; text-decoration: none; border-radius: 5px; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div style="width:100%; max-width:400px;">
        <h2>What is the issue?</h2>
        <button class="btn" onclick="sendAlert('Blocking Way')">Blocking My Way</button>
        <button class="btn" onclick="sendAlert('Found Item')">I Found Your Item</button>
        <button class="btn" onclick="sendAlert('Urgent Call')">Please Call Me</button>
    </div>
    <script>
        const tag = new URLSearchParams(window.location.search).get('tag');
        async function sendAlert(issue) {
            await fetch("https://script.google.com/macros/s/AKfycbz3oQqBzevolDjsRwTJexsog18KMq7cbavGMlRtJsDS9B4wV_-ks86o40xX2DFPVPhh/exec", { 
                method: "POST", 
                mode: "no-cors",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ tag: tag, issue: issue }) 
            });
            alert("Sent!");
        }
    </script>
</body>
</html>
