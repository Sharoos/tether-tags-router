<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Issue | Tether</title>
    <style>
        :root {
            --bg-color: #0f1115;
            --surface: #1c1f26;
            --text-main: #f8f9fa;
            --text-muted: #9ca3af;
            --accent: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .container { width: 100%; max-width: 400px; animation: fadeIn 0.6s ease forwards; opacity: 0; }
        @keyframes fadeIn { to { opacity: 1; } }

        /* Branding Area */
        .brand { text-align: center; margin-bottom: 2rem; }
        .logo-img { 
            width: 100px; height: 100px; border-radius: 50%; 
            border: 3px solid var(--accent); object-fit: cover;
            margin-bottom: 1rem; display: block; margin-left: auto; margin-right: auto;
        }
        .brand p { color: var(--text-muted); font-size: 0.9rem; margin-top: 10px; }

        .header { text-align: center; margin-bottom: 2rem; }
        .header h2 { font-size: 1.3rem; font-weight: 600; margin-bottom: 10px; }
      
        .logo { width: 150px; height: 150px; border-radius: 24px; margin-bottom: 2rem; border: 1px solid #333; }

        /* Custom Input */
        textarea {
            width: 100%; background: #15171c; border: 1px solid #2d313a;
            color: white; padding: 12px; border-radius: 10px;
            font-size: 0.95rem; margin-bottom: 20px; resize: none;
        }
        textarea:focus { outline: none; border-color: var(--accent); }

        .btn {
            display: flex; align-items: center; justify-content: center;
            width: 100%; background-color: var(--surface); color: var(--text-main);
            border: 1px solid #2d313a; padding: 18px; margin-bottom: 12px;
            border-radius: 12px; font-weight: 500; cursor: pointer; transition: 0.2s;
            position: relative; overflow: hidden; text-decoration: none;
        }
        .btn::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
        .btn-warning::before { background-color: #f59e0b; }
        .btn-success::before { background-color: #10b981; }
        .btn-accent { background: linear-gradient(135deg, var(--accent), #2563eb); border: none; }
        
        .btn:hover { background-color: #242831; transform: scale(1.01); }
        .btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <div class="brand">            
          <img src="https://i.ibb.co/5XnsDTjD/TT.png" class="logo" alt="Tether">
            <p>Smart tags for everything you love. ❤️</p>
        </div>

        <div class="header" id="actionArea">
            <h2>Contact Owner</h2>
            <textarea id="customMsg" rows="3" placeholder="Add a note (Optional, e.g., 'Found near Gate 2')"></textarea>
            
            <button class="btn btn-warning" onclick="sendAlert('Blocking Way', this, 'Vehicle is blocking my way')">Vehicle is blocking my way</button>
            <button class="btn btn-success" onclick="sendAlert('Found Item', this, 'I found your lost item')">I found your lost item</button>
        </div>
  </div>

    <script>
        // 1. Tag handling (Sticky Tag Logic)
        let tag = new URLSearchParams(window.location.search).get('tag');
        if (tag) { localStorage.setItem('currentTag', tag); } else { tag = localStorage.getItem('currentTag'); }
        
        // 2. MASK THE URL
        window.history.replaceState({}, document.title, window.location.protocol + "//" + window.location.host + window.location.pathname);

        // 3. The alert function
        async function sendAlert(issue, btn, label) {
            const custom = document.getElementById('customMsg').value;
            const finalIssue = custom ? `${issue}: ${custom}` : issue;
            
            btn.innerText = "Sending..."; btn.disabled = true;

            await fetch("https://script.google.com/macros/s/AKfycbz3oQqBzevolDjsRwTJexsog18KMq7cbavGMlRtJsDS9B4wV_-ks86o40xX2DFPVPhh/exec", { 
                method: "POST", mode: "no-cors",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ tag: tag, issue: finalIssue }) 
            });

            // Universal Marketing Success State
            document.getElementById('actionArea').innerHTML = `
                <div style="text-align: center; padding: 20px 0;">
                    <h2 style="color: #10b981; margin-bottom: 15px;">Owner Notified!</h2>
                    <p style="margin-bottom: 25px; color: var(--text-muted);">The owner has received your message instantly via WhatsApp. Thank you for reaching out!</p>
                    <a href="https://sharoos.github.io/Tether/home.html" class="btn btn-accent">Get your own Tether Tag</a>
                </div>
            `;
        }
    </script>
</body>
</html>
