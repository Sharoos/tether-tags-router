<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renew Tether | Secure Payment</title>
    <style>
        :root {
            --bg-color: #050505;
            --surface: #111111;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent: #FF6961;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body { 
            margin: 0;
            background-color: var(--bg-color); 
            background-image: radial-gradient(circle at 50% -20%, #1a1a1a 0%, #050505 100%);
            color: var(--text-main); 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; /* Aligns to top */
            padding-top: 80px;       /* Exact distance from top */
            min-height: 100vh; 
        }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .container { 
            text-align: center; max-width: 400px; width: 100%; 
            background: var(--surface); padding: 40px; border-radius: 24px; 
            border: 1px solid #222; animation: fadeInUp 0.8s ease-out;
        }
        
        .logo { width: 100px; height: 100px; border-radius: 20px; margin-bottom: 1.5rem; border: 1px solid #333; }
        
        h1 { font-size: 1.8rem; margin-bottom: 1rem; }
        p { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem; }
        
        .btn-cta {
            display: block;
            background: white; color: black; padding: 18px; border-radius: 50px;
            font-weight: 700; text-decoration: none; font-size: 1.1rem;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), background 0.3s;
        }
        .btn-cta:hover { transform: scale(1.05); background: #e0e0e0; }
        
        .error { color: var(--accent); display: none; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://i.ibb.co/5XnsDTjD/TT.png" class="logo" alt="Tether">
        <h1>Stay Protected</h1>
        <p>Your subscription has expired. Renew for another 30 days to keep your Tether alerts active.</p>
        
        <a href="#" id="pay-link" class="btn-cta">Pay ₹99 Now</a>
        <p id="error-msg" class="error">Invalid link. Please check your WhatsApp message.</p>
    </div>

    <script>
        // 1. SECURITY GUARDRAIL: Check for the payment link
        const urlParams = new URLSearchParams(window.location.search);
        const link = urlParams.get('link');
        const btn = document.getElementById('pay-link');
        const err = document.getElementById('error-msg');

        // If no link is provided, kick user to home page immediately
        if (!link || link.trim() === "" || link === "null") {
            window.location.replace('home.html');
        } else {
            // 2. Decode and set the payment link
            btn.href = decodeURIComponent(link);
        }
    </script>
</body>
</html>
