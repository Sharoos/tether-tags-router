<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renew Tether | Peace of Mind</title>
    <style>
        :root {
            --bg-color: #050505;
            --surface: #111111;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent: #FF6961;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .container { text-align: center; max-width: 400px; width: 100%; background: var(--surface); padding: 40px; border-radius: 24px; border: 1px solid #222; }
        .logo { width: 100px; height: 100px; border-radius: 20px; margin-bottom: 1.5rem; border: 1px solid #333; }
        
        h1 { font-size: 2rem; margin-bottom: 1rem; }
        p { color: var(--text-muted); margin-bottom: 2rem; }
        
        .btn-cta {
            display: block;
            background: white; color: black; padding: 18px; border-radius: 50px;
            font-weight: 700; text-decoration: none; font-size: 1.1rem;
            transition: transform 0.2s, background 0.2s;
        }
        .btn-cta:hover { transform: scale(1.02); background: #e0e0e0; }
        .error { color: var(--accent); display: none; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://i.ibb.co/5XnsDTjD/TT.png" class="logo" alt="Tether">
        <h1>Stay Protected</h1>
        <p>Your subscription has expired. Click below to renew for another 30 days and keep your Tether alerts active.</p>
        
        <a href="#" id="pay-link" class="btn-cta">Pay ₹99 Now</a>
        <p id="error-msg" class="error" style="margin-top:20px;">Invalid link. Please check your WhatsApp message.</p>
    </div>

    <script>
        // Get the payment link from the URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const link = urlParams.get('link');
        const btn = document.getElementById('pay-link');
        const err = document.getElementById('error-msg');

        if (link) {
            // Decode the link and set it as the button href
            btn.href = decodeURIComponent(link);
        } else {
            // Hide button and show error if no link found
            btn.style.display = "none";
            err.style.display = "block";
        }
    </script>
</body>
</html>
