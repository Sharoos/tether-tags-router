<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Tether Tag</title>
    <style>
        :root {
            --bg-color: #0f1115;
            --surface: #1c1f26;
            --border: #2d313a;
            --text-main: #f8f9fa;
            --text-muted: #9ca3af;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background-color: var(--surface);
            padding: 2.5rem 2rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* FIXED LAYOUT STYLES */
        .header { text-align: center; margin-bottom: 2rem; }
        .logo-container { margin-bottom: 1.5rem; }
        .logo-container img { 
            width: 90px; 
            height: 90px; 
            border-radius: 50%; 
            border: 3px solid var(--accent); 
            object-fit: cover; 
            display: block;
            margin: 0 auto;
        }
        .header h2 { font-size: 1.6rem; font-weight: 600; margin-top: 10px; }
        .header p { color: var(--text-muted); font-size: 0.95rem; margin-top: 5px; }

        .input-group { margin-bottom: 1.2rem; }
        
      .logo { width: 150px; height: 150px; border-radius: 24px; margin-bottom: 2rem; border: 1px solid #333; }
        
        input {
            width: 100%;
            background-color: #15171c;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 14px 16px;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background-color: #181b21;
        }

        input::placeholder { color: #5a606d; }
        input[readonly] { color: var(--accent); font-weight: 600; cursor: default; background-color: rgba(59, 130, 246, 0.05); }

        .helper-text { display: block; color: var(--text-muted); font-size: 0.8rem; margin-top: 6px; margin-left: 4px; }

        button {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: white;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4); }
        button:active { transform: translateY(0); }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <div class="header">
            <img src="https://i.ibb.co/5XnsDTjD/TT.png" class="logo" alt="Tether">
            <h5>Smart tags for everything you love. ❤️</h5>
          <br>
            <p>Activate your smart tag.</p>
        </div>
        
        <form id="regForm">
            <div class="input-group">
                <input type="text" id="tag" name="tag" readonly>
            </div>
            <div class="input-group">
                <input type="text" name="name" placeholder="Full Name" required>
            </div>
            <div class="input-group">
                <input type="text" name="item" placeholder="Item (e.g., Honda Civic, Backpack)" required>
            </div>
            <div class="input-group">
                <input type="tel" name="phone" placeholder="WhatsApp Number" required maxlength="10" minlength="10" pattern="[0-9]{10}">
                <span class="helper-text">Enter 10-digit number (no country code)</span>
            </div>
            <button type="submit" id="submitBtn">Complete Setup</button>
        </form>
    </div>

    <script>
        // 1. Get and Sanitize Tag
        const params = new URLSearchParams(window.location.search);
        let tag = params.get('tag');
        if (tag && tag.startsWith("TT-TT-")) { tag = tag.replace("TT-TT-", "TT-"); }
        
        // 2. MASK THE URL: Immediately hide the ID
        const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
        window.history.replaceState({}, document.title, cleanUrl);

        document.getElementById('tag').value = tag;
        
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const data = Object.fromEntries(new FormData(e.target));
            
            // Clean phone number and ensure exactly 10 digits
            let cleanPhone = data.phone.replace(/\D/g, ''); 
            if (cleanPhone.length !== 10) {
                alert("Please enter exactly 10 digits.");
                return;
            }
            // Silently add the country code for WhatsApp API
            data.phone = '91' + cleanPhone;
            data.tag = tag; // Ensure the sanitized tag is used

            btn.innerHTML = "Activating...";
            btn.style.opacity = "0.7";
            btn.disabled = true;
            
            await fetch("https://script.google.com/macros/s/AKfycbz3oQqBzevolDjsRwTJexsog18KMq7cbavGMlRtJsDS9B4wV_-ks86o40xX2DFPVPhh/exec", { 
                method: "POST", 
                mode: "no-cors", 
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify(data) 
            });
            
            const card = document.getElementById('mainCard');
            card.innerHTML = `
                <div style="text-align: center; padding: 20px 0; animation: fadeIn 0.6s ease;">
                    <div style="font-size: 3.5rem; margin-bottom: 15px;">✨</div>
                    <h2 style="color: #10b981; margin-bottom: 10px; font-size: 1.8rem;">Ready for the Real World</h2>
                    <p style="color: var(--text-muted); line-height: 1.6; font-size: 1rem;">
                        Your tag is successfully linked. Whether it's your car, keys, or pet, you are now protected with privacy-first notifications.
                    </p>
                    <p style="color: var(--text-muted); margin-top: 25px; font-size: 0.9rem; padding: 15px; background: #15171c; border-radius: 8px; border: 1px solid #2d313a;">
                        Attach your Tether Tag to your item. We've got your back from here.
                    </p>
                </div>
            `;
        };
    </script>
</body>
</html>
