<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activate Tether Tag</title>
    <style>
        :root {
            --bg-color: #050505;
            --surface: #111111;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent: #FF6961;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body { 
            background: radial-gradient(circle at 50% -20%, #1a1a1a 0%, #050505 100%);
            min-height: 100vh; margin: 0; display: flex; justify-content: center; align-items: flex-start; 
            padding: 80px 20px 20px 20px; color: white;
        }

        .container { text-width: 100%; max-width: 400px; }
        .box { padding: 40px; background: var(--surface); border-radius: 24px; border: 1px solid #222; text-align: center; }
        .logo { width: 90px; height: 90px; border-radius: 20px; margin-bottom: 1.5rem; border: 1px solid #333; }
        
        /* Spinner CSS matches your index.html */
        .spinner { 
            width: 30px; height: 30px; border: 3px solid rgba(255, 255, 255, 0.1); 
            border-top-color: var(--accent); border-radius: 50%; 
            animation: spin 0.8s linear infinite; margin: 0 auto 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        h2 { font-size: 1.5rem; margin-bottom: 10px; }
        p { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 20px; }
        
        .input-group { margin-bottom: 1.2rem; text-align: left; }
        input { width: 100%; background: #161616; border: 1px solid #333; color: white; padding: 16px; border-radius: 12px; font-size: 1rem; }
        input:focus { border-color: var(--accent); outline: none; }
        input[readonly] { color: var(--accent); font-weight: 600; }
        button { width: 100%; background: white; color: black; border: none; padding: 18px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .helper-text { display: block; color: var(--text-muted); font-size: 0.75rem; margin-top: 8px; }
    </style>
</head>
<body>

    <div class="container" id="mainCard">
        <div class="box" id="loader">
            <img src="https://i.ibb.co/5XnsDTjD/TT.png" class="logo" alt="Tether">
            <div class="spinner"></div>
            <h2>Authenticating...</h2>
            <p>Verifying tag security.</p>
        </div>

        <div class="box" id="formContainer" style="display: none;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <img src="https://i.ibb.co/5XnsDTjD/TT.png" class="logo" alt="Tether">
                <h2>Activate your Tag</h2>
            </div>
            <form id="regForm">
                <div class="input-group"><input type="text" id="tag" name="tag" readonly></div>
                <div class="input-group"><input type="text" name="name" placeholder="Full Name" required></div>
                <div class="input-group"><input type="text" name="item" placeholder="Item (e.g., Honda Civic)" required></div>
                <div class="input-group">
                    <input type="tel" name="phone" placeholder="WhatsApp Number" required maxlength="10" pattern="[0-9]{10}">
                    <span class="helper-text">10-digit number only (no country code)</span>
                </div>
                <button type="submit" id="submitBtn">Activate Tag</button>
            </form>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        let tag = params.get('tag');

        // URL Masking Code
        const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
        window.history.replaceState({}, document.title, cleanUrl);

        if (!tag) { window.location.replace('home.html'); }
        if (tag.startsWith("TT-TT-")) { tag = tag.replace("TT-TT-", "TT-"); }
        document.getElementById('tag').value = tag;

        // Security Check
        const verifyUrl = "https://script.google.com/macros/s/AKfycbz3oQqBzevolDjsRwTJexsog18KMq7cbavGMlRtJsDS9B4wV_-ks86o40xX2DFPVPhh/exec?tag=" + tag;
        
        fetch(verifyUrl).then(res => res.text()).then(status => {
            if (status.trim() === "register.html") {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('formContainer').style.display = 'block';
            } else { window.location.replace('home.html'); }
        }).catch(() => window.location.replace('home.html'));

        // Form Submission
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const data = Object.fromEntries(new FormData(e.target));
            data.phone = '91' + data.phone.replace(/\D/g, '');
            data.tag = tag;

            btn.innerHTML = "Activating..."; btn.disabled = true;
            await fetch("https://script.google.com/macros/s/AKfycbz3oQqBzevolDjsRwTJexsog18KMq7cbavGMlRtJsDS9B4wV_-ks86o40xX2DFPVPhf/exec", { method: "POST", mode: "no-cors", body: JSON.stringify(data) });
            
            document.getElementById('mainCard').innerHTML = `<div class="box"><h2>Success!</h2><p>Your tag is linked. Redirecting...</p></div>`;
            setTimeout(() => { window.location.replace('home.html'); }, 3000);
        };
    </script>
</body>
</html>
