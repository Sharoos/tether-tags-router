<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Activate your Tether Tag and secure your valuables in seconds.">
    <title>Activate Tether Tag</title>
    <style>
        :root {
            --bg-color: #050505;
            --surface: #111111;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent: #FF6961;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body { 
            margin: 0;
            background-color: var(--bg-color); 
            background-image: radial-gradient(circle at 50% -20%, #1a1a1a 0%, #050505 100%);
            color: var(--text-main); 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; /* Matches index.html */
            padding-top: 80px;       /* Matches index.html */
            min-height: 100vh; 
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* =========================================
           1. EXACT INDEX.HTML LOADER STYLES
           ========================================= */
        .container { text-align: center; max-width: 400px; width: 100%; animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .box { padding: 40px; background: var(--surface); border-radius: 24px; border: 1px solid #222; }
        .logo-auth { width: 100px; height: 100px; border-radius: 20px; margin-bottom: 2rem; border: 1px solid #333; }
        
        .spinner { 
            width: 30px; height: 30px; border: 3px solid rgba(255, 255, 255, 0.1); 
            border-top-color: var(--accent); border-radius: 50%; 
            animation: spin 0.8s linear infinite; margin: 0 auto 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* =========================================
           2. REGISTRATION FORM STYLES
           ========================================= */
        .card {
            background: var(--surface);
            padding: 2.5rem;
            border-radius: 24px;
            border: 1px solid #222;
            width: 100%;
            max-width: 400px;
            animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .header { text-align: center; margin-bottom: 2rem; }
        .logo-form { width: 90px; height: 90px; border-radius: 20px; margin-bottom: 1.5rem; border: 1px solid #333; }
        h2 { font-size: 1.5rem; margin-bottom: 10px; }
        p { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 20px; }

        .input-group { margin-bottom: 1.2rem; }
        input {
            width: 100%;
            background: #161616;
            border: 1px solid #333;
            color: white;
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); outline: none; background: #1a1a1a; }
        input[readonly] { color: var(--accent); font-weight: 600; cursor: not-allowed; }

        button {
            width: 100%;
            background: white;
            color: black;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }
        button:hover { background: #e0e0e0; transform: translateY(-2px); }
        
        .helper-text { display: block; color: var(--text-muted); font-size: 0.75rem; margin-top: 8px; }
        .btn-diagnostic { background: var(--accent); color: white; border: none; font-weight: 700; margin-top: 20px; padding: 12px 24px; border-radius: 50px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container" id="authBox">
        <div class="box">
            <img src="https://i.ibb.co/5XnsDTjD/TT.png" class="logo-auth" alt="Tether">
            <div class="spinner"></div>
            <h2>Authenticating...</h2>
            <p>Verifying the Tether Tag.</p>
        </div>
    </div>

    <div class="card" id="formView" style="display: none;">
        <div class="header">
            <img src="https://i.ibb.co/5XnsDTjD/TT.png" class="logo-form" alt="Tether">
            <h2 style="margin-bottom: 0.5rem;">Activate your Tag</h2>
            <p style="margin-bottom: 0;">Smart tags for everything you <span style="color: #FF6961;">love</span></p>
        </div>
        
        <form id="regForm">
            <div class="input-group">
                <input type="text" id="tag" name="tag" readonly>
            </div>
            <div class="input-group">
                <input type="text" name="name" placeholder="Full Name" required>
            </div>
            <div class="input-group">
                <input type="text" name="item" placeholder="Item (e.g., Honda Civic, Backpack)" required>
            </div>
            <div class="input-group">
                <input type="tel" name="phone" placeholder="WhatsApp Number" required maxlength="10" minlength="10" pattern="[0-9]{10}">
                <span class="helper-text">10-digit number only (no country code)</span>
            </div>
            <button type="submit" id="submitBtn">Activate Tag</button>
        </form>
    </div>

    <script>
        // --- 1. MASK URL IMMEDIATELY ---
        const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
        window.history.replaceState({}, document.title, cleanUrl);

        // --- 2. GET TAG ---
        const params = new URLSearchParams(window.location.search);
        let tag = params.get('tag');

        if (tag && tag.startsWith("TT-TT-")) { tag = tag.replace("TT-TT-", "TT-"); }
        if (tag) { document.getElementById('tag').value = tag; }

        // --- 3. DIAGNOSTIC SECURITY GATE ---
        const verifyUrl = "https://script.google.com/macros/s/AKfycbz3oQqBzevolDjsRwTJexsog18KMq7cbavGMlRtJsDS9B4wV_-ks86o40xX2DFPVPhh/exec?tag=" + tag;
        
        fetch(verifyUrl)
            .then(res => res.text())
            .then(status => {
                const response = status.trim();
                
                if (response === "register.html") {
                    // Success! Hide the loader box, show the form card smoothly
                    document.getElementById('authBox').style.display = 'none';
                    document.getElementById('formView').style.display = 'block';
                } else {
                    // STOP REDIRECTING! Show what the server actually returned.
                    document.getElementById('authBox').innerHTML = `
                        <div class="box">
                            <h2 style="color:var(--accent);">Verification Stalled</h2>
                            <p style="margin-bottom:10px;">The server responded with:</p>
                            <code style="display:block; padding:10px; background:#000; border-radius:8px; color:var(--text-muted); margin-bottom:15px;">"${response}"</code>
                            <p style="font-size:0.85rem">It was expecting "register.html"</p>
                            <button class="btn-diagnostic" onclick="document.getElementById('authBox').style.display='none'; document.getElementById('formView').style.display='block';">Force Load Form</button>
                        </div>
                    `;
                }
            })
            .catch((err) => {
                document.getElementById('authBox').innerHTML = `<div class="box"><h2 style="color:var(--accent);">Network Error</h2><p>${err}</p></div>`;
            });

        // --- 4. FORM SUBMISSION ---
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const data = Object.fromEntries(new FormData(e.target));
            
            let cleanPhone = data.phone.replace(/\D/g, ''); 
            if (cleanPhone.length !== 10) { alert("Please enter exactly 10 digits."); return; }
            data.phone = '91' + cleanPhone;
            data.tag = tag;

            btn.innerHTML = "Activating...";
            btn.disabled = true;
            
            await fetch("https://script.google.com/macros/s/AKfycbz3oQqBzevolDjsRwTJexsog18KMq7cbavGMlRtJsDS9B4wV_-ks86o40xX2DFPVPhh/exec", { 
                method: "POST", mode: "no-cors", headers: { "Content-Type": "text/plain" }, body: JSON.stringify(data) 
            });
            
            // Show Success Box matching the form card size
            document.getElementById('formView').innerHTML = `
                <div style="text-align: center; padding: 20px 0;">
                    <img src="https://i.ibb.co/5XnsDTjD/TT.png" class="logo-form" alt="Tether">
                    <h2 style="color: #FF6961; margin-bottom: 10px;">Ready for the Real World</h2>
                    <p style="color: white;">Your tag is successfully linked. We've got your back from here.</p>
                </div>
            `;
        };
    </script>
</body>
</html>
