<!DOCTYPE html>
<html>
<body>
    <form id="regForm">
        <input type="text" id="tag" name="tag" readonly>
        <input type="text" name="name" placeholder="Name" required>
        <input type="text" name="item" placeholder="Item" required>
        <input type="tel" name="phone" placeholder="Phone" required>
        <button type="submit">Complete Registration</button>
    </form>
    <script>
        document.getElementById('tag').value = new URLSearchParams(window.location.search).get('tag');
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(e.target));
            await fetch("https://script.google.com/macros/s/AKfycbz3oQqBzevolDjsRwTJexsog18KMq7cbavGMlRtJsDS9B4wV_-ks86o40xX2DFPVPhh/exec", { 
                method: "POST", 
                mode: "no-cors", 
                body: JSON.stringify(data) 
            });
            alert("Registration Success!");
            window.location.href = "report.html?tag=" + data.tag;
        };
    </script>
</body>
</html>
