<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Tether Tag</title>
    <style>
        :root {
            --bg-color: #0f1115;
            --surface: #1c1f26;
            --border: #2d313a;
            --text-main: #f8f9fa;
            --text-muted: #9ca3af;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background-color: var(--surface);
            padding: 2.5rem 2rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .header { text-align: center; margin-bottom: 2rem; }
        .header h2 { font-size: 1.5rem; font-weight: 600; letter-spacing: 0.5px; }
        .header p { color: var(--text-muted); font-size: 0.9rem; margin-top: 5px; }

        .input-group { margin-bottom: 1.2rem; }
        
        input {
            width: 100%;
            background-color: #15171c;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 14px 16px;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background-color: #181b21;
        }

        input::placeholder { color: #5a606d; }
        input[readonly] { color: var(--accent); font-weight: 600; cursor: default; background-color: rgba(59, 130, 246, 0.05); }

        button {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            color: white;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        button:active { transform: translateY(0); }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <h2>Activate Tag</h2>
            <p>Link this tag to your contact details</p>
        </div>
        <form id="regForm">
            <div class="input-group">
                <input type="text" id="tag" name="tag" readonly>
            </div>
            <div class="input-group">
                <input type="text" name="name" placeholder="Full Name" required>
            </div>
            <div class="input-group">
                <input type="text" name="item" placeholder="Item (e.g., Honda Civic, Backpack)" required>
            </div>
            <div class="input-group">
                <input type="tel" name="phone" placeholder="WhatsApp Number (incl. country code)" required>
            </div>
            <button type="submit" id="submitBtn">Complete Setup</button>
        </form>
    </div>

    <script>
        document.getElementById('tag').value = new URLSearchParams(window.location.search).get('tag');
        
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = "Activating...";
            btn.style.opacity = "0.7";

            const data = Object.fromEntries(new FormData(e.target));
            
            await fetch("https://script.google.com/macros/s/AKfycbz3oQqBzevolDjsRwTJexsog18KMq7cbavGMlRtJsDS9B4wV_-ks86o40xX2DFPVPhh/exec", { 
                method: "POST", 
                mode: "no-cors", 
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify(data) 
            });
            
            window.location.href = "report.html?tag=" + data.tag;
        };
    </script>

</body>
</html>
