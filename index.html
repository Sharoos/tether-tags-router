<!DOCTYPE html>
<html>
<head>
    <script>
        // Get the tag ID from the URL
        const params = new URLSearchParams(window.location.search);
        const tag = params.get('tag');
        
        // The script URL
        const scriptUrl = "https://script.google.com/macros/s/AKfycbz3oQqBzevolDjsRwTJexsog18KMq7cbavGMlRtJsDS9B4wV_-ks86o40xX2DFPVPhh/exec?tag=" + tag;
        
        // FORCE the browser to navigate to the script immediately
        // This bypasses CORS and the "Loading" hang entirely
        window.location.href = scriptUrl;
    </script>
</head>
<body>
    <p>Redirecting to Tether Tag...</p>
</body>
</html>
