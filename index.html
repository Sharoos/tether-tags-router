<!DOCTYPE html>
<html>
<head>
    <script>
        const params = new URLSearchParams(window.location.search);
        const tag = params.get('tag');
        
        // PASTE YOUR GOOGLE SCRIPT URL HERE
        const scriptUrl = "https://script.google.com/macros/s/AKfycbz3oQqBzevolDjsRwTJexsog18KMq7cbavGMlRtJsDS9B4wV_-ks86o40xX2DFPVPhh/exec";

        if (tag) {
            fetch(scriptUrl + "?tag=" + tag)
                .then(response => response.text())
                .then(url => {
                    window.location.href = url;
                });
        } else {
            // Fallback if no tag is provided
            window.location.href = "https://tally.so/r/eqyv7Q";
        }
    </script>
</head>
<body>
    <p>Loading Tether Tag...</p>
</body>
</html>
