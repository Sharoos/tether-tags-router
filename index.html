<!DOCTYPE html>
<html>
<body>
    <p>Loading Tether Tag...</p>
    <script>
        const params = new URLSearchParams(window.location.search);
        const tag = params.get('tag');
        // IMPORTANT: In Google Script, change return to JSON so GitHub can read it
        const scriptUrl = "https://script.google.com/macros/s/AKfycbz3oQqBzevolDjsRwTJexsog18KMq7cbavGMlRtJsDS9B4wV_-ks86o40xX2DFPVPhh/exec?tag=" + tag;

        fetch(scriptUrl)
            .then(response => response.text())
            .then(targetUrl => {
                // The user never sees the script URL. 
                // They stay on your GitHub page until the final redirect.
                window.location.replace(targetUrl.trim());
            });
    </script>
</body>
</html>
