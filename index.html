<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tether Tags | Authenticating...</title>
    <style>
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-family: sans-serif; 
            background-color: #f8f9fa; 
        }
        .loader { 
            border: 4px solid #f3f3f3; 
            border-top: 4px solid #007bff; 
            border-radius: 50%; 
            width: 40px; 
            height: 40px; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p>Authenticating your tag...</p>

    <script>
        const params = new URLSearchParams(window.location.search);
        const tag = params.get('tag');
        
        // This is your Google Script URL. 
        // IMPORTANT: Ensure this is the EXACT URL of your latest deployment.
        const scriptUrl = "https://script.google.com/macros/s/AKfycbz3oQqBzevolDjsRwTJexsog18KMq7cbavGMlRtJsDS9B4wV_-ks86o40xX2DFPVPhf/exec?tag=" + tag;

        // Perform the silent fetch to get the file path (e.g., 'report.html?tag=...')
        fetch(scriptUrl, { mode: 'cors' })
            .then(response => response.text())
            .then(data => {
                const path = data.trim();
                // Navigate to the file within your own GitHub domain
                window.location.replace(path);
            })
            .catch(err => {
                document.body.innerHTML = "<h3>Error</h3><p>Could not connect to database.</p>";
            });
    </script>
</body>
</html>
