<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Authenticating...</title>
    <style>
        :root { --bg-color: #0f1115; --accent: #3b82f6; }
        body { background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: #fff; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(59, 130, 246, 0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="spinner"></div>

    <script>
        // 1. Get the tag from the URL
        const params = new URLSearchParams(window.location.search);
        const tag = params.get('tag');
        
        // 2. MASK THE URL: Remove the "?tag=IND-..." from the address bar immediately
        const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
        window.history.replaceState({}, document.title, cleanUrl);

        // 3. Perform the silent background fetch
        const scriptUrl = "https://script.google.com/macros/s/AKfycbz3oQqBzevolDjsRwTJexsog18KMq7cbavGMlRtJsDS9B4wV_-ks86o40xX2DFPVPhh/exec?tag=" + tag;
        
        fetch(scriptUrl)
            .then(response => response.text())
            .then(page => {
                const result = page.trim();
                if (result === "invalid") {
                    document.body.innerHTML = "<h2>Invalid Tag</h2>";
                } else {
                    // Redirect to the final page with the tag hidden from history
                    window.location.replace(result + "?tag=" + tag);
                }
            });
    </script>
</body>
</html>
