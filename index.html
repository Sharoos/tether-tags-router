<!DOCTYPE html>
<html>
<head>
    <script>
        // Get the tag ID from the URL
        const params = new URLSearchParams(window.location.search);
        const tag = params.get('tag');
        
        // This is your Google Script Web App URL
        const scriptUrl = "https://script.google.com/macros/s/AKfycbz3oQqBzevolDjsRwTJexsog18KMq7cbavGMlRtJsDS9B4wV_-ks86o40xX2DFPVPhh/exec";

        if (tag) {
            // Silently fetch the redirect decision from your script
            fetch(scriptUrl + "?tag=" + tag)
                .then(response => response.text())
                .then(url => {
                    // Redirect the user to the Tally form the script chose
                    window.location.href = url;
                });
        }
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
