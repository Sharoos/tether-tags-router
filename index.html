<!DOCTYPE html>
<html>
<head>
    <title>Tether Tags</title>
</head>
<body>
    <p>Authenticating your tag...</p>

    <script>
        const params = new URLSearchParams(window.location.search);
        const tag = params.get('tag');

        // This calls your Google Script "API" silently
        // Replace with your actual script URL
        const scriptUrl = "https://script.google.com/macros/s/AKfycbz3oQqBzevolDjsRwTJexsog18KMq7cbavGMlRtJsDS9B4wV_-ks86o40xX2DFPVPhh/exec?tag=" + tag;

        fetch(scriptUrl)
            .then(response => response.text())
            .then(targetUrl => {
                // If script returns a URL, jump to it
                // targetUrl will be either register.html, report.html, or renew.html
                window.location.replace(targetUrl.trim());
            })
            .catch(err => {
                document.body.innerHTML = "Error connecting to server. Please try again.";
            });
    </script>
</body>
</html>
