<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating...</title>
    <style>
        :root { --bg-color: #0f1115; --accent: #3b82f6; --text-main: #ffffff; }
        body { 
            background-color: var(--bg-color); 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            color: #fff; margin: 0; padding: 20px;
        }
        .container { text-align: center; max-width: 400px; }
        .spinner { 
            width: 40px; height: 40px; border: 4px solid rgba(59, 130, 246, 0.2); 
            border-top-color: var(--accent); border-radius: 50%; 
            animation: spin 1s linear infinite; margin: 0 auto 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Error Styling */
        .error-box { padding: 30px; background: #1c1f26; border-radius: 20px; border: 1px solid #333; }
        .btn-home { 
            display: inline-block; margin-top: 20px; background: var(--accent); 
            color: white; padding: 12px 25px; border-radius: 10px; text-decoration: none; 
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container" id="authBox">
        <div class="spinner"></div>
        <h2>Authenticating Tag...</h2>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        let tag = params.get('tag');
        
        // Remove double prefix if exists
        if (tag && tag.startsWith("IND-IND-")) { tag = tag.replace("IND-IND-", "IND-"); }
        
        // Mask the URL immediately
        window.history.replaceState({}, document.title, window.location.protocol + "//" + window.location.host + window.location.pathname);

        const scriptUrl = "https://script.google.com/macros/s/AKfycbz3oQqBzevolDjsRwTJexsog18KMq7cbavGMlRtJsDS9B4wV_-ks86o40xX2DFPVPhh/exec?tag=" + tag;
        
        fetch(scriptUrl)
            .then(response => response.text())
            .then(page => {
                const result = page.trim();
                if (result === "invalid") {
                    // SHOW BRANDED ERROR PAGE
                    document.getElementById('authBox').innerHTML = `
                        <div class="error-box">
                            <h2 style="margin-bottom: 15px;">Tag not recognized</h2>
                            <p style="color: #a0a0a0;">This Tether tag is not activated. Visit our home page to learn more.</p>
                            <a href="home.html" class="btn-home">Visit Tether</a>
                        </div>
                    `;
                } else {
                    window.location.replace(result + "?tag=" + tag);
                }
            })
            .catch(() => {
                document.getElementById('authBox').innerHTML = "<h2 style='color: #f59e0b;'>Connection Error</h2>";
            });
    </script>
</body>
</html>
